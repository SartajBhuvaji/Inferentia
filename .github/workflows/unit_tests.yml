name: Unit Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests with ruff-checked code
        run: |
          uv venv
          uv pip install pytest ruff
          set +e
          uv run pytest
          code=$?
          if [ $code -eq 5 ]; then
            echo "No tests collected; treating as success."
            exit 0
          fi
          exit $code
